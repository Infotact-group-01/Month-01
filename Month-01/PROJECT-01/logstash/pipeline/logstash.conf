# ─────────────────────────────────────────────────────────────────────────────
# TIP Logstash Pipeline — Audit Log Ingestion
# ─────────────────────────────────────────────────────────────────────────────
# This pipeline reads the enforcer, rollback, and ingestion log files produced
# by the TIP platform and pushes structured events into Elasticsearch for
# centralized monitoring, alerting, and Kibana visualisation.
#
# Log files are volume-mounted into the container at /logs/.
#
# Elasticsearch index: tip-audit-logs
# ─────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# INPUT — Tail the three TIP log files
# ══════════════════════════════════════════════════════════════════════════════
input {

  # ── Enforcer Daemon Log ────────────────────────────────────────────────────
  # Format: 2026-05-25 10:00:00  INFO      BLOCKED | IP=1.2.3.4 ...
  file {
    path => "/logs/enforcer.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "enforcer"
    codec => plain { charset => "UTF-8" }
  }

  # ── Rollback API Audit Log ────────────────────────────────────────────────
  # Format: one JSON object per line
  # {"timestamp":"...","action":"ROLLBACK","ip":"1.2.3.4","reason":"...","analyst":"..."}
  file {
    path => "/logs/rollback.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "rollback"
    codec => "json_lines"
  }

  # ── Ingestion Pipeline Log ────────────────────────────────────────────────
  # Format: 2026-05-25 10:00:00  INFO      Starting TIP ingestion ...
  file {
    path => "/logs/ingestion.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    type => "ingestion"
    codec => plain { charset => "UTF-8" }
  }
}


# ══════════════════════════════════════════════════════════════════════════════
# FILTER — Parse each log type into structured fields
# ══════════════════════════════════════════════════════════════════════════════
filter {

  # ── Enforcer log parsing ──────────────────────────────────────────────────
  if [type] == "enforcer" {

    # Match the standard Python logging format with optional audit fields
    grok {
      match => {
        "message" => [
          # Audit lines: BLOCKED | IP=... | risk=... | source=... | tags=[...]
          "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:log_level}\s+%{DATA:prefix}%{WORD:action}\s+\|\s+IP=%{IP:blocked_ip}\s+\|\s+risk=%{INT:risk_score}\s+\|\s+source=%{DATA:source}\s+\|\s+tags=\[%{DATA:tags}\]",
          # General log lines
          "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:log_level}\s+%{GREEDYDATA:log_message}"
        ]
      }
    }

    # Parse the timestamp into @timestamp
    date {
      match => [ "log_timestamp", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
      remove_field => [ "log_timestamp" ]
    }

    # Convert risk_score to integer
    if [risk_score] {
      mutate {
        convert => { "risk_score" => "integer" }
      }
    }

    # Detect dry-run mode from prefix
    if [prefix] =~ /DRY-RUN/ {
      mutate {
        add_field => { "dry_run" => true }
      }
    }
  }

  # ── Rollback log parsing ──────────────────────────────────────────────────
  # Already parsed as JSON by the codec — just fix the timestamp
  if [type] == "rollback" {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
      remove_field => [ "timestamp" ]
    }
  }

  # ── Ingestion log parsing ─────────────────────────────────────────────────
  if [type] == "ingestion" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp}\s+%{LOGLEVEL:log_level}\s+%{GREEDYDATA:log_message}"
      }
    }

    date {
      match => [ "log_timestamp", "yyyy-MM-dd HH:mm:ss" ]
      target => "@timestamp"
      remove_field => [ "log_timestamp" ]
    }

    # Extract numeric counts from ingestion summaries
    if [log_message] =~ /Fetched total/ {
      grok {
        match => { "log_message" => "Fetched total %{INT:fetched_count} indicators" }
        add_field => { "event_type" => "fetch_complete" }
      }
      mutate { convert => { "fetched_count" => "integer" } }
    }

    if [log_message] =~ /Inserted/ {
      grok {
        match => { "log_message" => "Inserted %{INT:inserted_count} new indicators" }
        add_field => { "event_type" => "insert_complete" }
      }
      mutate { convert => { "inserted_count" => "integer" } }
    }

    if [log_message] =~ /Elasticsearch sync/ {
      grok {
        match => { "log_message" => "Elasticsearch sync: %{INT:es_indexed} indexed, %{INT:es_failed} failed" }
        add_field => { "event_type" => "es_sync_complete" }
      }
      mutate {
        convert => {
          "es_indexed" => "integer"
          "es_failed" => "integer"
        }
      }
    }
  }

  # ── Common: remove internal fields ────────────────────────────────────────
  mutate {
    remove_field => [ "host", "path", "prefix" ]
  }
}


# ══════════════════════════════════════════════════════════════════════════════
# OUTPUT — Send structured events to Elasticsearch
# ══════════════════════════════════════════════════════════════════════════════
output {

  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "${ES_USER:elastic}"
    password => "${ELASTIC_PASSWORD}"
    index => "tip-audit-logs"
    document_type => "_doc"
  }

  # Also print to stdout for debugging (visible via `docker logs tip-logstash`)
  stdout {
    codec => rubydebug
  }
}
